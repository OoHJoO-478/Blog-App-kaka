<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ブログ一覧画面</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="blog-page">

<header class="blog-header">
    <div class="logo">Blog</div>
    <nav>
        <a href="/blog-list">Home</a>
        <a href="/blog-form">Blog Register</a>
        <a href="/logout" class="logout">Logout</a>
    </nav>
</header>

<main class="blog-main">
    <section class="blog-top">
        <h1>ようこそ、User さん！</h1>
        <p>ここからブログを書いたり、編集したり、管理できます。</p>
        <a href="/blog-form" class="main-btn">新しい記事を書く</a>
    </section>
    
   <section class="blog-card">
    <div class="card-title-row">
        <h2>ブログ記事一覧</h2>
        <a href="/blog-manage" class="manage-link">記事ステータス管理</a>
    </div>

    <article class="article-item">
        <div class="article-img">No Image</div>
        <div>
            <h3>記事タイトル</h3>
            <p>・by User</p>
            <a href="/blog-edit">続きを読む →</a>
        </div>
    </article>
</section>
</main>

<footer>Copyright © SMH All rights reserved</footer>

</body>
</html>
