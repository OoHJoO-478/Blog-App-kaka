<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>記事ステータス管理</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="blog-page">

<header class="blog-header">
    <div class="logo">Blog</div>
    <nav>
		<a th:href="@{/blog-list}" th:text="${accountName}">User</a>
		<a th:href="@{/blog-form}">Blog Register</a>
		<a th:href="@{/blog/logout}" class="logout">Logout</a>
    </nav>
</header>

<main class="blog-main">

    <section class="form-card">
        <h1>記事ステータス管理</h1>
        <p class="form-subtitle">下の表から、記事ごとにステータスを変更できます。</p>

        <table class="blog-table">
            <thead>
                <tr>
                    <th>タイトル</th>
                    <th>カテゴリ</th>
                    <th>作成日時</th>
                    <th>ステータス</th>
                    <th>操作</th>
                </tr>
            </thead>

			<tbody>
			    <!-- 記事がない時 -->
			    <tr th:if="${blogList == null or blogList.isEmpty()}">
			        <td colspan="5" class="empty-message">
			            まだ記事がありません。
			        </td>
			    </tr>

			    <!-- 記事がある時 -->
			    <tr th:each="blog : ${blogList}">
			        <td>
			            <a th:href="@{/blog-edit(blogId=${blog.blogId})}"
			               th:text="${blog.blogTitle}"
			               class="article-link">
			                記事タイトル
			            </a>
			        </td>

			        <td th:text="${blog.categoryName}">料理</td>

			        <td>
			            <span th:text="${blog.createdAt}">2026/05/21</span>
			        </td>

			        <td>
			            <select class="status-select">
			                <option>公開</option>
			                <option>非公開</option>
			            </select>
			        </td>

					<td>
					    <a th:href="@{/blog-edit(blogId=${blog.blogId})}" class="edit-btn">編集</a>

					    <form th:action="@{/blog-delete}" method="post" class="delete-form">
					        <input type="hidden" name="blogId" th:value="${blog.blogId}">
					        <button type="submit" class="delete-action-btn">削除</button>
					    </form>
					</td>
			    </tr>
			</tbody>
        </table>
    </section>

</main>

<footer>
    Copyright © SMH All rights reserved
</footer>
<script>
    const deleteForms = document.querySelectorAll('.delete-form');

    deleteForms.forEach(function(form) {
        form.addEventListener('submit', function(event) {
            const result = confirm('本当にこの記事を削除しますか？');

            if (!result) {
                event.preventDefault();
            }
        });
    });
</script>
</body>
</html>
